<!DOCTYPE html>
<html>
<head>
<title>FitBrand AI Workout Generator</title>
<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:60px;
}
input,select,button{
padding:14px;
margin:8px;
border-radius:8px;
border:none;
width:260px;
}
button{
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}
#result{
max-width:800px;
margin:auto;
background:#111;
padding:30px;
border-radius:12px;
white-space:pre-wrap;
display:none;
}
</style>
</head>

<body>

<h1>FitBrand AI Workout Generator</h1>
<p>Generate your personal workout plan instantly</p>

<br>

<input id="age" placeholder="Age"><br>
<input id="gender" placeholder="Gender"><br>
<input id="weight" placeholder="Weight kg"><br>
<input id="height" placeholder="Height cm"><br>

<select id="goal">
<option>Build Muscle</option>
<option>Lose Fat</option>
<option>Strength</option>
<option>Aesthetic Body</option>
<option>General Fitness</option>
</select><br>

<select id="level">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select><br>

<input id="days" placeholder="Workout days per week"><br>
<input id="equipment" placeholder="Equipment available"><br>

<button onclick="generatePlan()">Generate Plan</button>

<br><br>

<pre id="result"></pre>

<script>
function generatePlan(){

const age=document.getElementById("age").value
const gender=document.getElementById("gender").value
const weight=document.getElementById("weight").value
const height=document.getElementById("height").value
const goal=document.getElementById("goal").value
const level=document.getElementById("level").value
const days=document.getElementById("days").value
const equipment=document.getElementById("equipment").value

const plan=`
FITBRAND PERSONAL WORKOUT PLAN

Age: ${age}
Gender: ${gender}
Weight: ${weight}kg
Height: ${height}cm
Goal: ${goal}
Fitness Level: ${level}
Workout Days: ${days}
Equipment: ${equipment}

DAY 1 – PUSH
Bench Press – 4x8
Shoulder Press – 3x10
Incline Dumbbell Press – 3x10
Lateral Raises – 3x15
Triceps Pushdowns – 3x12

DAY 2 – PULL
Pull Ups – 4x8
Barbell Rows – 3x10
Cable Row – 3x10
Face Pulls – 3x15
Bicep Curls – 3x12

DAY 3 – LEGS
Squats – 4x8
Romanian Deadlift – 3x10
Walking Lunges – 3x12
Leg Curl – 3x12
Calf Raises – 4x15

CARDIO
20-30 minutes 2-3x per week.

Generated by FitBrand AI
`

document.getElementById("result").style.display="block"
document.getElementById("result").textContent=plan
}
</script>

</body>
</html>
